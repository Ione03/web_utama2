<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  
  <!-- SEO Meta Tags -->
  <title>Authbox - Secure Authentication Platform</title>
  <meta name="description" content="Welcome to Authbox - A secure authentication platform with modern features">
  <meta name="keywords" content="authentication, security, login, oauth, authbox">
  <meta name="author" content="Authbox">
  
  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website">
  <meta property="og:url" content="/">
  <meta property="og:title" content="Authbox - Secure Authentication Platform">
  <meta property="og:description" content="Welcome to Authbox - A secure authentication platform with modern features">
  <meta property="og:image" content="/logo.png">
  
  <!-- Twitter -->
  <meta property="twitter:card" content="summary_large_image">
  <meta property="twitter:url" content="/">
  <meta property="twitter:title" content="Authbox - Secure Authentication Platform">
  <meta property="twitter:description" content="Welcome to Authbox - A secure authentication platform with modern features">
  <meta property="twitter:image" content="/logo.png">
  
  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="manifest" href="/manifest.json">
  
  <!-- Theme Color -->
  <meta name="theme-color" content="#4F46E5">
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      color: #fff;
    }
    
    .container {
      text-align: center;
      padding: 2rem;
    }
    
    .logo {
      width: 120px;
      height: 120px;
      margin: 0 auto 2rem;
      animation: pulse 2s ease-in-out infinite;
    }
    
    h1 {
      font-size: 2.5rem;
      font-weight: 700;
      margin-bottom: 1rem;
      text-shadow: 0 2px 10px rgba(0,0,0,0.2);
    }
    
    p {
      font-size: 1.125rem;
      opacity: 0.9;
      margin-bottom: 2rem;
    }
    
    .spinner {
      width: 50px;
      height: 50px;
      border: 4px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      margin: 0 auto;
      animation: spin 1s linear infinite;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    
    .error {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.3);
      border-radius: 8px;
      padding: 1rem;
      margin-top: 2rem;
      display: none;
    }
    
    .error.show {
      display: block;
    }
    
    noscript {
      display: block;
      background: rgba(251, 191, 36, 0.1);
      border: 1px solid rgba(251, 191, 36, 0.3);
      border-radius: 8px;
      padding: 1rem;
      margin-top: 2rem;
      color: #fbbf24;
    }
  </style>
</head>
<body>
  <div class="container">
    <img src="/logo.png" alt="Authbox Logo" class="logo" onerror="this.style.display='none'">
    
    <h1>Authbox</h1>
    <p>Secure Authentication Platform</p>
    
    <div class="spinner"></div>
    
    <div class="error" id="error">
      <p>⚠️ Failed to load the application. Please check your connection and try again.</p>
    </div>
    
    <noscript>
      <p>⚠️ JavaScript is required to run this application. Please enable JavaScript in your browser.</p>
    </noscript>
  </div>
  
  <script>
    // Show error after 10 seconds if app hasn't loaded
    setTimeout(function() {
      if (!window.qwikAppLoaded) {
        document.getElementById('error').classList.add('show');
      }
    }, 10000);
    
    // This will be set by the Qwik app when it loads
    window.qwikAppLoaded = false;
  </script>
</body>
</html>
